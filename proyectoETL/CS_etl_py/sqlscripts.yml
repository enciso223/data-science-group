dim_fecha :
  create table dim_fecha
  (
  key_dim_fecha SERIAL not null
  constraint dim_fecha_pk
  primary key,
  fecha_completa timestamp,
  ano            integer,
  mes            integer,
  dia            integer,
  nombre_mes     text,
  nombre_dia     text,
  weekday        integer,
  quarter        integer,
  day_of_year    integer,
  day_of_month   integer,
  date_str       text,
  "is_Holiday"   boolean,
  holiday        text,
  weekend        boolean,
  saved          date
  );

dim_hora :
  create table dim_hora
  (
  key_dim_hora SERIAL not null
  constraint dim_hora_pk
  primary key,
  minute_of_day    integer,
  hora             integer,
  minuto           integer,
  hour_12          integer,
  meridiem         text,
  time_str         text,
  time_12_str      text,
  franja_horaria   text,
  is_business_hour boolean,
  saved            date
  );

dim_estado :
  create table dim_estado
  (
  key_dim_estado SERIAL not null
  constraint dim_estado_pk
  primary key,
  id              integer,
  nombre_estado   text,
  orden_secuencia integer,
  saved           date
  );

dim_sede :
  create table dim_sede
  (
  key_dim_sede SERIAL not null
  constraint dim_sede_pk
  primary key,
  sede_id         integer,
  nombre_sede     text,
  direccion       text,
  telefono        text,
  nombre_contacto text,
  ciudad          text,
  departamento    text,
  cliente_id      integer,
  saved           date
  );

dim_tipo_servicio :
  create table dim_tipo_servicio
  (
  key_dim_tipo_servicio SERIAL not null
  constraint dim_tipo_servicio_pk
  primary key,
  grupo        text,
  nombre_tipo  text,
  descripcion  text,
  saved        date
  );